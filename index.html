<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unravel Digital — Payroll</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231D9E75'/><path d='M38 25v50l34-25z' fill='white'/></svg>" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand: #1D9E75; --brand-50: #E1F5EE; --brand-dark: #085041;
    --paid-bg: #EAF3DE; --paid-color: #3B6D11; --paid-border: #97C459;
    --danger: #E24B4A; --danger-bg: #FCEBEB;
    --bg: #ffffff; --bg-2: #f6f6f4; --bg-3: #f0efed;
    --text: #1a1a18; --text-2: #6b6b67; --text-3: #9b9b96;
    --border: rgba(0,0,0,0.12); --border-2: rgba(0,0,0,0.22);
    --radius: 8px; --radius-lg: 12px; --radius-xl: 16px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg-2: #222220; --bg-3: #2a2a28;
      --text: #f0efe8; --text-2: #a0a09a; --text-3: #686864;
      --border: rgba(255,255,255,0.1); --border-2: rgba(255,255,255,0.2);
      --brand-50: #04342C; --brand-dark: #9FE1CB;
      --paid-bg: #173404; --paid-color: #97C459; --paid-border: #3B6D11;
      --danger-bg: #501313;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg-3); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

  /* Topbar */
  .topbar { background: var(--bg); border-bottom: 0.5px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo { width: 32px; height: 32px; border-radius: 8px; background: var(--brand); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 16px; height: 16px; fill: white; }
  .app-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .app-sub { font-size: 12px; color: var(--text-2); }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; font-size: 13px; font-weight: 500; border-radius: var(--radius); border: 0.5px solid var(--border-2); background: var(--bg); color: var(--text); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg-2); }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .btn-primary { background: var(--brand); color: white; border-color: var(--brand); }
  .btn-primary:hover { opacity: 0.88; background: var(--brand); }
  .btn-danger { border-color: var(--danger); color: var(--danger); }
  .btn-danger:hover { background: var(--danger-bg); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-ghost { border-color: transparent; background: transparent; }
  .btn-ghost:hover { background: var(--bg-2); border-color: var(--border); }

  /* Year tabs */
  .year-tabs { display: flex; gap: 4px; }
  .year-tab { padding: 5px 12px; font-size: 13px; font-weight: 500; border-radius: var(--radius); border: 0.5px solid var(--border); background: transparent; color: var(--text-2); cursor: pointer; transition: all 0.15s; }
  .year-tab.active { background: var(--brand); color: white; border-color: var(--brand); }
  .year-tab:hover:not(.active) { background: var(--bg-2); color: var(--text); }

  /* Stats */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px 18px; }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .stat-value { font-size: 22px; font-weight: 600; color: var(--text); }
  .stat-value.accent { color: var(--brand); }

  /* Cutoff chips */
  .filter-section { margin-bottom: 20px; }
  .filter-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); margin-bottom: 8px; }
  .cutoff-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 4px 11px; font-size: 12px; font-weight: 500; border-radius: 20px; border: 0.5px solid var(--border); background: var(--bg); color: var(--text-2); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .chip:hover:not(.active) { background: var(--bg-2); }
  .chip.active { background: var(--brand-50); color: var(--paid-color); border-color: var(--brand); }

  /* Table */
  .table-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-xl); overflow: hidden; }
  .table-toolbar { padding: 14px 18px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .table-toolbar-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .search-input { padding: 6px 12px; font-size: 13px; border: 0.5px solid var(--border-2); border-radius: var(--radius); background: var(--bg-2); color: var(--text); width: 200px; outline: none; }
  .search-input:focus { border-color: var(--brand); }
  .search-input::placeholder { color: var(--text-3); }

  .table-head { display: grid; grid-template-columns: 36px 1fr 130px 120px 110px 36px; padding: 9px 18px; background: var(--bg-2); font-size: 11px; font-weight: 600; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 0.5px solid var(--border); }
  .emp-row { display: grid; grid-template-columns: 36px 1fr 130px 120px 110px 36px; padding: 10px 18px; align-items: center; border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
  .emp-row:last-child { border-bottom: none; }
  .emp-row:hover { background: var(--bg-2); }

  /* QR thumbnail in table */
  .qr-thumb { width: 28px; height: 28px; border-radius: 4px; object-fit: cover; border: 0.5px solid var(--border); cursor: pointer; }
  .qr-placeholder { width: 28px; height: 28px; border-radius: 4px; border: 0.5px dashed var(--border-2); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text-3); font-size: 14px; transition: all 0.15s; }
  .qr-placeholder:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-50); }

  .emp-name-cell { display: flex; align-items: center; gap: 10px; cursor: pointer; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--brand-50); color: var(--brand-dark); font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .emp-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .emp-role-text { font-size: 11px; color: var(--text-3); margin-top: 1px; }
  .emp-salary-cell { font-size: 13px; color: var(--text-2); }
  .emp-cutoff-cell { font-size: 13px; color: var(--text-2); }
  .emp-status-cell { display: flex; justify-content: flex-end; }
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; font-size: 12px; font-weight: 500; border-radius: 20px; cursor: pointer; transition: opacity 0.15s; border: 0.5px solid transparent; }
  .badge:hover { opacity: 0.7; }
  .badge.paid { background: var(--paid-bg); color: var(--paid-color); border-color: var(--paid-border); }
  .badge.unpaid { background: var(--bg-2); color: var(--text-2); border-color: var(--border); }
  .del-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: none; cursor: pointer; color: var(--text-3); font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .del-btn:hover { background: var(--danger-bg); color: var(--danger); }

  .table-total { display: grid; grid-template-columns: 36px 1fr 130px 120px 110px 36px; padding: 11px 18px; background: var(--bg-2); font-size: 13px; font-weight: 600; border-top: 0.5px solid var(--border-2); }
  .table-total .lbl { font-size: 11px; font-weight: 500; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.05em; }

  /* Add form */
  .add-form-row { padding: 14px 18px; border-top: 0.5px solid var(--border); background: var(--bg-2); display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 500; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.04em; }
  .field input { padding: 7px 11px; font-size: 13px; border: 0.5px solid var(--border-2); border-radius: var(--radius); background: var(--bg); color: var(--text); outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--brand); }
  .field input::placeholder { color: var(--text-3); }
  .field input[type="text"] { width: 155px; }
  .field input[type="number"] { width: 120px; }
  .field input[type="email"] { width: 170px; }

  /* Modal / Overlay */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.48); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 20px; animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .panel { background: var(--bg); border-radius: var(--radius-xl); border: 0.5px solid var(--border); width: 520px; max-width: 100%; max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .panel-header { padding: 16px 20px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--bg); z-index: 1; }
  .panel-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .panel-close { width: 28px; height: 28px; border-radius: 50%; border: none; background: none; cursor: pointer; color: var(--text-2); font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .panel-close:hover { background: var(--bg-2); }
  .panel-body { padding: 20px; }
  .panel-footer { padding: 14px 20px; border-top: 0.5px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  /* Detail panel */
  .detail-top { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 0.5px solid var(--border); }
  .detail-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--brand-50); color: var(--brand-dark); font-size: 17px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .detail-info { flex: 1; }
  .detail-name { font-size: 17px; font-weight: 600; color: var(--text); }
  .detail-meta { font-size: 13px; color: var(--text-2); margin-top: 3px; }

  /* QR section in detail */
  .qr-section { margin-bottom: 20px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-3); margin-bottom: 10px; }
  .qr-card { background: var(--bg-2); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; display: flex; align-items: center; gap: 16px; }
  .qr-image-wrap { position: relative; flex-shrink: 0; }
  .qr-display { width: 110px; height: 110px; border-radius: var(--radius); object-fit: contain; border: 0.5px solid var(--border); background: white; cursor: pointer; transition: transform 0.15s; }
  .qr-display:hover { transform: scale(1.03); }
  .qr-empty { width: 110px; height: 110px; border-radius: var(--radius); border: 2px dashed var(--border-2); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: all 0.15s; color: var(--text-3); }
  .qr-empty:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-50); }
  .qr-empty svg { width: 28px; height: 28px; }
  .qr-empty-label { font-size: 11px; font-weight: 500; text-align: center; }
  .qr-info { flex: 1; }
  .qr-bank-name { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .qr-acct { font-size: 12px; color: var(--text-2); font-family: monospace; margin-bottom: 12px; }
  .qr-actions { display: flex; flex-direction: column; gap: 6px; }
  .qr-upload-btn { position: relative; overflow: hidden; }
  .qr-upload-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }

  /* Fullscreen QR viewer */
  .qr-viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 300; cursor: pointer; animation: fadeIn 0.15s; }
  .qr-viewer img { max-width: 85vw; max-height: 75vh; border-radius: var(--radius-lg); object-fit: contain; }
  .qr-viewer-name { color: white; font-size: 16px; font-weight: 600; margin-top: 16px; }
  .qr-viewer-sub { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 4px; }
  .qr-viewer-hint { color: rgba(255,255,255,0.35); font-size: 12px; margin-top: 16px; }

  /* Edit fields */
  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .edit-field { display: flex; flex-direction: column; gap: 5px; }
  .edit-label { font-size: 11px; font-weight: 500; color: var(--text-2); text-transform: uppercase; letter-spacing: 0.04em; }
  .edit-input { padding: 8px 11px; font-size: 13px; border: 0.5px solid var(--border-2); border-radius: var(--radius); background: var(--bg-2); color: var(--text); outline: none; transition: border-color 0.15s; }
  .edit-input:focus { border-color: var(--brand); background: var(--bg); }

  /* Cutoff list */
  .cutoff-list { display: flex; flex-direction: column; gap: 5px; }
  .cutoff-item { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; border: 0.5px solid var(--border); border-radius: var(--radius); transition: all 0.1s; }
  .cutoff-item.is-paid { background: var(--paid-bg); border-color: var(--paid-border); }
  .cutoff-left { display: flex; align-items: center; gap: 8px; }
  .cutoff-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border-2); flex-shrink: 0; }
  .cutoff-item.is-paid .cutoff-dot { background: var(--brand); }
  .cutoff-name { font-size: 13px; color: var(--text); }
  .cutoff-right { display: flex; align-items: center; gap: 10px; }
  .cutoff-amount { font-size: 12px; color: var(--text-2); }
  .toggle-pill { padding: 4px 10px; font-size: 11px; font-weight: 600; border-radius: 20px; border: 0.5px solid; cursor: pointer; transition: all 0.15s; }
  .toggle-pill.mark-paid { background: var(--paid-bg); color: var(--paid-color); border-color: var(--paid-border); }
  .toggle-pill.mark-unpaid { background: var(--bg-2); color: var(--text-2); border-color: var(--border-2); }

  .progress-wrap { margin-top: 16px; }
  .progress-track { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--brand); border-radius: 3px; transition: width 0.4s ease; }
  .progress-meta { font-size: 12px; color: var(--text-2); margin-top: 6px; }

  /* Export panel */
  .export-scope { display: flex; gap: 6px; margin-bottom: 16px; }
  .scope-opt { flex: 1; padding: 8px; font-size: 12px; font-weight: 500; text-align: center; border: 0.5px solid var(--border); border-radius: var(--radius); cursor: pointer; background: var(--bg); color: var(--text-2); transition: all 0.15s; }
  .scope-opt.active { background: var(--brand-50); color: var(--paid-color); border-color: var(--brand); }
  .export-option { display: flex; align-items: center; gap: 14px; padding: 13px 14px; margin-bottom: 8px; border: 0.5px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; transition: all 0.15s; }
  .export-option:hover { background: var(--bg-2); }
  .export-option.active { border-color: var(--brand); background: var(--brand-50); }
  .export-icon { width: 38px; height: 38px; border-radius: var(--radius); background: var(--bg-2); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .export-option.active .export-icon { background: var(--bg); }
  .export-option-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .export-option-desc { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  /* Confirm */
  .confirm-body { text-align: center; padding: 8px 0; }
  .confirm-icon { font-size: 36px; margin-bottom: 12px; }
  .confirm-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
  .confirm-msg { font-size: 13px; color: var(--text-2); line-height: 1.6; }
  .confirm-actions { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500; z-index: 999; animation: toastIn 0.2s ease; white-space: nowrap; pointer-events: none; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(8px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  /* Responsive */
  @media (max-width: 700px) {
    .table-head, .emp-row, .table-total { grid-template-columns: 36px 1fr 100px 90px 36px; }
    .table-head > div:nth-child(4), .emp-row > div:nth-child(4), .table-total > div:nth-child(4) { display: none; }
    .container { padding: 16px; }
    .edit-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .table-head, .emp-row, .table-total { grid-template-columns: 36px 1fr 90px 36px; }
    .table-head > div:nth-child(3), .emp-row > div:nth-child(3), .table-total > div:nth-child(3) { display: none; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>
    <div><div class="app-name">Unravel Digital</div><div class="app-sub">Payroll tracker</div></div>
  </div>
  <div class="topbar-right">
    <div class="year-tabs" id="year-tabs"></div>
    <button class="btn" onclick="openExport()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
      Export
    </button>
    <button class="btn btn-primary" onclick="openAddForm()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
      Add employee
    </button>
  </div>
</div>

<div class="container">
  <div class="stats-grid" id="stats"></div>
  <div class="filter-section">
    <div class="filter-label">Cutoff period</div>
    <div class="cutoff-chips" id="chips"></div>
  </div>
  <div class="table-card">
    <div class="table-toolbar">
      <div class="table-toolbar-title" id="toolbar-title">Employees</div>
      <input class="search-input" type="text" placeholder="Search employees…" oninput="filterSearch(this.value)" />
    </div>
    <div class="table-head">
      <div></div><div>Employee</div><div>Monthly salary</div><div>Per cutoff</div>
      <div style="text-align:right;">Status</div><div></div>
    </div>
    <div id="emp-list"></div>
    <div class="table-total" id="table-total"></div>
    <div id="add-form-area"></div>
  </div>
</div>

<div id="overlay"></div>
<div id="qr-viewer-area"></div>
<div id="toast-container"></div>

<script>

  {name:'Mariel',               role:'',            salary:15000, email:'', acct:''},
  {name:'Juan Rafael Galang',   role:'',            salary:25000, email:'', acct:'·1202'},
  {name:'Miguel Lianza',        role:'',            salary:20000, email:'', acct:'·2382'},
  {name:'Joshua Mari Cueto',    role:'',            salary:20000, email:'', acct:'·4329'},
  {name:'Reinier Kristoffe Gozo',role:'',           salary:20000, email:'', acct:'·1207'},
  {name:'Francis Jun Dait',     role:'',            salary:15000, email:'', acct:'·3422'},
  {name:'Rafael Tapang',        role:'',            salary:15000, email:'', acct:'·3774'},
  {name:'Carlo Barrantes',      role:'',            salary:15000, email:'', acct:'·7865'},
  {name:'Almon Ray Agner',      role:'',            salary:20000, email:'', acct:'·0643'},
];

const LATE_START = ['Mark Lester Pamintuan','Reginald Dave Retodo','Rizzele Marie Olaes','Kenneth Todoc','Shaira Canaling','Mariel','Miguel Lianza','Rafael Tapang'];

function mkData() {
  const d = {};
  [2025,2026].forEach(y => {
    d[y] = SEED.map(e => ({...e, paid:{}, qr:null}));
    if (y === 2025) {
      const pc = ['Jan 15','Jan 30','Feb 15','Feb 28','Mar 15','Mar 30','Apr 15','Apr 30'];
      d[y].forEach(emp => {
        pc.forEach(c => {
          if (c==='Jan 15' && LATE_START.includes(emp.name)) return;
          emp.paid[c] = true;
        });
      });
    }
  });
  return d;
}

function load() {
  try { const r = localStorage.getItem('udp_v4'); if (r) return JSON.parse(r); } catch(e) {}
  return mkData();
}
function save() { try { localStorage.setItem('udp_v4', JSON.stringify(DB)); } catch(e) {} }

let DB = load();
let YR = 2026;
let CUTOFF = (() => {
  const now = new Date();
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()];
  const d = now.getDate() <= 15 ? '15' : '30';
  const g = `${m} ${d}`;
  return CUTOFFS.includes(g) ? g : 'Mar 15';
})();
let SEARCH = '';
let ADDING = false;
let _exportScope = 'cutoff', _exportFmt = 'csv';

const fmt = n => '₱' + Math.round(n).toLocaleString();
const ini = n => n.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();

function render() { renderYearTabs(); renderChips(); renderStats(); renderTable(); }

function renderYearTabs() {
  document.getElementById('year-tabs').innerHTML = [2025,2026].map(y =>
    `<button class="year-tab${y===YR?' active':''}" onclick="switchYear(${y})">${y}</button>`
  ).join('');
}

function renderChips() {
  document.getElementById('chips').innerHTML = CUTOFFS.map(c =>
    `<span class="chip${c===CUTOFF?' active':''}" onclick="setCutoff('${c}')">${c}</span>`
  ).join('');
}

function renderStats() {
  const emps = DB[YR]||[];
  const totSal = emps.reduce((s,e)=>s+e.salary,0);
  const totCut = emps.reduce((s,e)=>s+(e.salary/2),0);
  const paidAmt = emps.filter(e=>e.paid[CUTOFF]).reduce((s,e)=>s+(e.salary/2),0);
  const paidN = emps.filter(e=>e.paid[CUTOFF]).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total employees</div><div class="stat-value">${emps.length}</div></div>
    <div class="stat-card"><div class="stat-label">Monthly payroll</div><div class="stat-value">${fmt(totSal)}</div></div>
    <div class="stat-card"><div class="stat-label">Paid — ${CUTOFF}</div><div class="stat-value accent">${fmt(paidAmt)}</div></div>
    <div class="stat-card"><div class="stat-label">Pending — ${CUTOFF}</div><div class="stat-value">${fmt(totCut-paidAmt)}</div></div>
    <div class="stat-card"><div class="stat-label">Paid count</div><div class="stat-value">${paidN}<span style="font-size:14px;font-weight:400;color:var(--text-2)"> / ${emps.length}</span></div></div>
  `;
}

function renderTable() {
  const emps = DB[YR]||[];
  const q = SEARCH.toLowerCase();
  const filtered = q ? emps.filter(e=>e.name.toLowerCase().includes(q)) : emps;
  document.getElementById('toolbar-title').textContent = `${filtered.length} employee${filtered.length!==1?'s':''}`;
  document.getElementById('emp-list').innerHTML = filtered.map((emp) => {
    const i = emps.indexOf(emp);
    const cut = emp.salary/2;
    const paid = emp.paid[CUTOFF];
    const qrHtml = emp.qr
      ? `<img class="qr-thumb" src="${emp.qr}" onclick="viewQR(${i})" title="View QR — ${emp.name}" />`
      : `<div class="qr-placeholder" onclick="openDetail(${i})" title="Upload QR">+</div>`;
    return `<div class="emp-row">
      <div>${qrHtml}</div>
      <div class="emp-name-cell" onclick="openDetail(${i})">
        <div class="avatar">${ini(emp.name)}</div>
        <div><div class="emp-name">${emp.name}</div>${emp.role?`<div class="emp-role-text">${emp.role}</div>`:''}</div>
      </div>
      <div class="emp-salary-cell">${fmt(emp.salary)}</div>
      <div class="emp-cutoff-cell">${fmt(cut)}</div>
      <div class="emp-status-cell"><span class="badge ${paid?'paid':'unpaid'}" onclick="quickToggle(${i})">${paid?'Paid':'Pending'}</span></div>
      <div style="display:flex;justify-content:center;"><button class="del-btn" onclick="confirmDel(${i})">×</button></div>
    </div>`;
  }).join('');
  const totSal = emps.reduce((s,e)=>s+e.salary,0);
  const totCut = emps.reduce((s,e)=>s+(e.salary/2),0);
  document.getElementById('table-total').innerHTML = `
    <div></div><div class="lbl">${emps.length} employees</div>
    <div>${fmt(totSal)}</div><div>${fmt(totCut)}</div><div></div><div></div>`;
  renderAddForm();
}

function renderAddForm() {
  document.getElementById('add-form-area').innerHTML = ADDING ? `
    <div class="add-form-row">
      <div class="field"><label>Name</label><input type="text" id="f-name" placeholder="Full name" /></div>
      <div class="field"><label>Role</label><input type="text" id="f-role" placeholder="e.g. Developer" /></div>
      <div class="field"><label>Salary (₱/mo)</label><input type="number" id="f-salary" placeholder="e.g. 25000" /></div>
      <div class="field"><label>Email</label><input type="email" id="f-email" placeholder="Optional" /></div>
      <div style="display:flex;gap:6px;align-self:flex-end;padding-bottom:1px;">
        <button class="btn btn-primary btn-sm" onclick="addEmp()">Save</button>
        <button class="btn btn-sm" onclick="cancelAdd()">Cancel</button>
      </div>
    </div>` : '';
  if (ADDING) setTimeout(()=>{ const el=document.getElementById('f-name'); if(el) el.focus(); },50);
}

function switchYear(y) { YR=y; render(); }
function setCutoff(c) { CUTOFF=c; renderChips(); renderStats(); renderTable(); }
function filterSearch(v) { SEARCH=v; renderTable(); }
function openAddForm() { ADDING=true; renderAddForm(); window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); }
function cancelAdd() { ADDING=false; renderAddForm(); }

function addEmp() {
  const name=(document.getElementById('f-name').value||'').trim();
  const role=(document.getElementById('f-role').value||'').trim();
  const salary=parseInt(document.getElementById('f-salary').value)||0;
  const email=(document.getElementById('f-email').value||'').trim();
  if (!name||salary<1) { toast('Name and salary are required'); return; }
  if (!DB[YR]) DB[YR]=[];
  DB[YR].push({name,role,salary,email,acct:'',paid:{},qr:null});
  save(); ADDING=false; render();
  toast(`${name} added`);
}

function quickToggle(i) {
  DB[YR][i].paid[CUTOFF] = !DB[YR][i].paid[CUTOFF];
  save(); renderStats(); renderTable();
  toast(DB[YR][i].paid[CUTOFF]?'Marked as paid':'Marked as pending');
}

function confirmDel(i) {
  const emp = DB[YR][i];
  showOverlay(`<div class="panel" style="width:340px;" onclick="event.stopPropagation()">
    <div class="panel-body confirm-body">
      <div class="confirm-icon">🗑</div>
      <div class="confirm-title">Remove ${emp.name}?</div>
      <div class="confirm-msg">This will remove ${emp.name} from the ${YR} payroll. All payment records will be deleted.</div>
      <div class="confirm-actions">
        <button class="btn btn-danger" onclick="doDelete(${i})">Yes, remove</button>
        <button class="btn" onclick="closeOverlay()">Cancel</button>
      </div>
    </div></div>`);
}
function doDelete(i) {
  const name=DB[YR][i].name; DB[YR].splice(i,1);
  save(); closeOverlay(); render(); toast(`${name} removed`);
}

// ── QR handling ──
function viewQR(i) {
  const emp = DB[YR][i];
  if (!emp.qr) return;
  document.getElementById('qr-viewer-area').innerHTML = `
    <div class="qr-viewer" onclick="closeQRViewer()">
      <img src="${emp.qr}" alt="${emp.name} QR" />
      <div class="qr-viewer-name">${emp.name}</div>
      <div class="qr-viewer-sub">GOtyme Bank · InstaPay ${emp.acct||''}</div>
      <div class="qr-viewer-hint">Tap anywhere to close</div>
    </div>`;
}
function closeQRViewer() { document.getElementById('qr-viewer-area').innerHTML=''; }

function handleQRUpload(i, input) {
  const file = input.files[0];
  if (!file) return;
  if (!file.type.startsWith('image/')) { toast('Please upload an image file'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    DB[YR][i].qr = e.target.result;
    save(); renderTable();
    // re-open detail if it's open
    if (document.getElementById('overlay').innerHTML) openDetail(i);
    toast('QR uploaded');
  };
  reader.readAsDataURL(file);
}

function removeQR(i) {
  DB[YR][i].qr = null;
  save(); renderTable();
  openDetail(i);
  toast('QR removed');
}

// ── Detail panel ──
function openDetail(i) { renderDetail(i); }

function renderDetail(i) {
  const emp = DB[YR][i];
  const cut = emp.salary/2;
  const paidC = CUTOFFS.filter(c=>emp.paid[c]).length;
  const pct = Math.round((paidC/CUTOFFS.length)*100);
  const totalPaid = paidC*cut;

  const qrBlock = emp.qr
    ? `<div class="qr-card">
        <div class="qr-image-wrap">
          <img class="qr-display" src="${emp.qr}" alt="QR" onclick="viewQR(${i})" title="Click to enlarge" />
        </div>
        <div class="qr-info">
          <div class="qr-bank-name">GOtyme Bank · InstaPay</div>
          <div class="qr-acct">${emp.acct||'Account on QR'}</div>
          <div class="qr-actions">
            <button class="btn btn-primary btn-sm qr-upload-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              Replace QR
              <input type="file" accept="image/*" onchange="handleQRUpload(${i}, this)" />
            </button>
            <button class="btn btn-ghost btn-sm" onclick="viewQR(${i})">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg>
              Fullscreen
            </button>
            <button class="btn btn-sm" style="color:var(--danger);border-color:var(--danger);" onclick="removeQR(${i})">Remove QR</button>
          </div>
        </div>
      </div>`
    : `<div class="qr-card" style="justify-content:center;flex-direction:column;align-items:center;gap:12px;padding:24px;">
        <label style="cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;">
          <div class="qr-empty" style="width:100px;height:100px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h.01M14 17h3M17 14v3M20 17v3M20 14h.01"/></svg>
            <span class="qr-empty-label">Upload QR</span>
          </div>
          <span style="font-size:12px;color:var(--text-2);">Click to upload GOtyme InstaPay QR</span>
          <input type="file" accept="image/*" style="display:none;" onchange="handleQRUpload(${i}, this)" />
        </label>
      </div>`;

  const items = CUTOFFS.map(c => {
    const p = emp.paid[c];
    return `<div class="cutoff-item${p?' is-paid':''}">
      <div class="cutoff-left"><div class="cutoff-dot"></div><span class="cutoff-name">${c}</span></div>
      <div class="cutoff-right">
        <span class="cutoff-amount">${fmt(cut)}</span>
        <button class="toggle-pill ${p?'mark-unpaid':'mark-paid'}" onclick="toggleDetail(${i},'${c}')">${p?'Unpaid':'Mark paid'}</button>
      </div>
    </div>`;
  }).join('');

  showOverlay(`<div class="panel" onclick="event.stopPropagation()">
    <div class="panel-header">
      <div class="panel-title">Employee details</div>
      <button class="panel-close" onclick="closeOverlay()">×</button>
    </div>
    <div class="panel-body">
      <div class="detail-top">
        <div class="detail-avatar">${ini(emp.name)}</div>
        <div class="detail-info">
          <div class="detail-name">${emp.name}</div>
          <div class="detail-meta">${emp.role||'No role set'} · ${fmt(emp.salary)}/mo · ${fmt(cut)}/cutoff</div>
        </div>
      </div>

      <div class="qr-section">
        <div class="section-title">GOtyme InstaPay QR</div>
        ${qrBlock}
      </div>

      <div class="edit-grid">
        <div class="edit-field"><label class="edit-label">Full name</label><input class="edit-input" type="text" value="${emp.name}" onchange="updateEmp(${i},'name',this.value)" /></div>
        <div class="edit-field"><label class="edit-label">Role</label><input class="edit-input" type="text" value="${emp.role||''}" placeholder="e.g. Developer" onchange="updateEmp(${i},'role',this.value)" /></div>
        <div class="edit-field"><label class="edit-label">Monthly salary (₱)</label><input class="edit-input" type="number" value="${emp.salary}" onchange="updateEmp(${i},'salary',parseInt(this.value)||0)" /></div>
        <div class="edit-field"><label class="edit-label">Account (last 4)</label><input class="edit-input" type="text" value="${emp.acct||''}" placeholder="e.g. ·1234" onchange="updateEmp(${i},'acct',this.value)" /></div>
      </div>

      <div class="section-title">Payment history — ${YR}</div>
      <div class="cutoff-list">${items}</div>
      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-meta">${paidC} of ${CUTOFFS.length} cutoffs paid · ${fmt(totalPaid)} released</div>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn btn-danger btn-sm" onclick="closeOverlay();confirmDel(${i})">Remove employee</button>
      <button class="btn btn-primary btn-sm" onclick="closeOverlay()">Done</button>
    </div>
  </div>`);
}

function updateEmp(i, field, val) {
  DB[YR][i][field]=val; save(); renderStats(); renderTable();
}
function toggleDetail(i, c) {
  DB[YR][i].paid[c]=!DB[YR][i].paid[c]; save(); renderStats(); renderTable(); renderDetail(i);
}

// ── Export ──
function openExport() {
  _exportScope='cutoff'; _exportFmt='csv';
  showOverlay(`<div class="panel" style="width:440px;" onclick="event.stopPropagation()">
    <div class="panel-header"><div class="panel-title">Export payroll data</div><button class="panel-close" onclick="closeOverlay()">×</button></div>
    <div class="panel-body">
      <div class="section-title" style="margin-bottom:10px;">Scope</div>
      <div class="export-scope">
        <div class="scope-opt active" id="sc-cutoff" onclick="setExpScope('cutoff')">Current cutoff<br><small style="opacity:.7">${CUTOFF}</small></div>
        <div class="scope-opt" id="sc-year" onclick="setExpScope('year')">Full year<br><small style="opacity:.7">${YR}</small></div>
        <div class="scope-opt" id="sc-all" onclick="setExpScope('all')">All years<br><small style="opacity:.7">2025 + 2026</small></div>
      </div>
      <div class="section-title" style="margin-bottom:10px;">Format</div>
      <div class="export-option active" id="ef-csv" onclick="setExpFmt('csv')">
        <div class="export-icon">📄</div>
        <div><div class="export-option-title">CSV spreadsheet</div><div class="export-option-desc">Open in Excel, Google Sheets, or Numbers</div></div>
      </div>
      <div class="export-option" id="ef-json" onclick="setExpFmt('json')">
        <div class="export-icon">{ }</div>
        <div><div class="export-option-title">JSON backup</div><div class="export-option-desc">Full data export including QR images</div></div>
      </div>
    </div>
    <div class="panel-footer">
      <button class="btn" onclick="closeOverlay()">Cancel</button>
      <button class="btn btn-primary" onclick="doExport()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        Download
      </button>
    </div>
  </div>`);
}
function setExpScope(s) { _exportScope=s; ['cutoff','year','all'].forEach(x=>{const el=document.getElementById('sc-'+x);if(el)el.className='scope-opt'+(x===s?' active':'');}); }
function setExpFmt(f) { _exportFmt=f; ['csv','json'].forEach(x=>{const el=document.getElementById('ef-'+x);if(el)el.className='export-option'+(x===f?' active':'');}); }

function doExport() {
  let content, filename;
  if (_exportFmt==='csv') {
    if (_exportScope==='cutoff') {
      const emps=DB[YR]||[];
      const rows=[['Name','Role','Email','Account','Monthly Salary','Per Cutoff','Amount','Status','Cutoff','Year']];
      emps.forEach(e=>rows.push([e.name,e.role||'',e.email||'',e.acct||'',e.salary,e.salary/2,e.paid[CUTOFF]?e.salary/2:0,e.paid[CUTOFF]?'Paid':'Pending',CUTOFF,YR]));
      content=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n'); filename=`payroll_${YR}_${CUTOFF.replace(' ','_')}.csv`;
    } else if (_exportScope==='year') {
      const emps=DB[YR]||[];
      const header=['Name','Role','Email','Account','Monthly Salary',...CUTOFFS,'Total Paid (₱)','Total Pending (₱)'];
      const rows=[header];
      emps.forEach(e=>{const cut=e.salary/2;const paidAmt=CUTOFFS.filter(c=>e.paid[c]).length*cut;rows.push([e.name,e.role||'',e.email||'',e.acct||'',e.salary,...CUTOFFS.map(c=>e.paid[c]?'Paid':''),paidAmt,(cut*CUTOFFS.length)-paidAmt]);});
      content=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n'); filename=`payroll_${YR}_full.csv`;
    } else {
      const rows=[['Year','Name','Role','Email','Account','Monthly Salary','Cutoff','Status','Amount (₱)']];
      Object.entries(DB).forEach(([y,emps])=>emps.forEach(e=>CUTOFFS.forEach(c=>rows.push([y,e.name,e.role||'',e.email||'',e.acct||'',e.salary,c,e.paid[c]?'Paid':'Pending',e.salary/2]))));
      content=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n'); filename=`payroll_all_data.csv`;
    }
  } else {
    // JSON — include QR data too
    const exportDB = _exportScope==='all' ? DB : {[YR]: DB[YR]||[]};
    content=JSON.stringify(exportDB,null,2);
    filename=_exportScope==='all'?`payroll_all_data.json`:_exportScope==='year'?`payroll_${YR}.json`:`payroll_${YR}_${CUTOFF.replace(' ','_')}.json`;
  }
  const blob=new Blob([content],{type:_exportFmt==='csv'?'text/csv':'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
  closeOverlay(); toast(`Exported ${filename}`);
}

function showOverlay(html) { document.getElementById('overlay').innerHTML=`<div class="overlay" onclick="closeOverlay()">${html}</div>`; }
function closeOverlay() { document.getElementById('overlay').innerHTML=''; }
function toast(msg) {
  const id='t'+Date.now(); const c=document.getElementById('toast-container');
  c.innerHTML=`<div class="toast" id="${id}">${msg}</div>`;
  setTimeout(()=>{const el=document.getElementById(id);if(el)el.remove();},2200);
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeOverlay(); closeQRViewer(); } });

render();
</script>
